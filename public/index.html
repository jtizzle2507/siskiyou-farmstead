<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siskiyou Farmstead - Greens & Mushrooms</title>
    <meta name="description" content="Siskiyou Farmstead — Fresh greens and gourmet mushrooms grown locally in Siskiyou County, California. Weekly delivery throughout the region.">

    <meta name="twitter:description" content="Siskiyou Farmstead — Fresh greens and gourmet mushrooms grown locally in Siskiyou County, California. Weekly delivery throughout the region.">

    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://js.stripe.com/v3/"></script>

    <style>
        * {
            transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #555;
            background-color: #faf8f4;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Gentium Book Plus', serif;
            color: #2d2d2d;
        }
        .logo-container {
            max-width: 200px;
            margin: 0 auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5a7c65 0%, #4a6b55 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(90, 124, 101, 0.4);
            background: linear-gradient(135deg, #6a8c75 0%, #5a7c65 100%);
        }
        .product-card {
            transition: all 0.3s ease;
            border: 1px solid #e8e4dc;
            background: #faf8f4;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(139, 115, 85, 0.12);
            border-color: #c9a96e;
        }
        .delivery-badge {
            background: linear-gradient(135deg, #5a7c65 0%, #4a6b55 100%);
        }
        .nav-link {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: #5a7c65;
        }
        .section-heading {
            font-family: 'Gentium Book Plus', serif;
            color: #2d2d2d;
        }
    </style>
</head>
<body class="bg-[#faf8f4]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useCallback } = React;

        // ==================== SUPABASE CLIENT ====================
        const supabaseClient = supabase.createClient(
            'https://wqziuuslzjyfgqsvvcca.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxeml1dXNsemp5Zmdxc3Z2Y2NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMjI1NDEsImV4cCI6MjA4NTg5ODU0MX0.8nAJubZ1yrFd1KkNm4gT34t877o1THi74beX3FJzxHk'
        );

        // Helper to call the admin API route for write operations
        async function adminApi(action, data) {
            const response = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, data })
            });
            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || 'Admin API request failed');
            }
            return result;
        }

        // ==================== CONTEXTS ====================
        const CartContext = createContext();
        const AuthContext = createContext();
        const ProductContext = createContext();
        const OrderContext = createContext();
        const DeliveryContext = createContext();

        // ==================== INITIAL DATA ====================
        const DEFAULT_zones = {
            'hilt-hornbrook': { name: 'Hilt / Hornbrook', day: 'Monday', fee: 2 },
            'weed-shastina': { name: 'Weed / Lake Shastina', day: 'Tuesday', fee: 2 },
            'mtshasta-dunsmuir': { name: 'Mt Shasta / Dunsmuir / McCloud', day: 'Wednesday', fee: 2 },
            'yreka-grenada': { name: 'Yreka / Grenada / Montague', day: 'Thursday', fee: 2 },
            'fortjones-etna': { name: 'Fort Jones / Greenview / Quartz Valley / Etna', day: 'Friday', fee: 2 },
            'pickup': { name: 'Yreka Pickup (Sunday)', day: 'Sunday', fee: 0 }
        };

        const DEFAULT_DELIVERY_INFO = [
            { id: '1', icon: '\u{1F4E6}', title: '$25 Minimum', description: 'All orders' },
            { id: '2', icon: '\u{1F69A}', title: '$2 Delivery', description: 'To your zone' },
            { id: '3', icon: '\u{1F3E1}', title: 'Free Pickup', description: 'Sundays in Yreka' }
        ];

        const INITIAL_PRODUCTS = [
            { id: 'mush-4oz', name: 'Mixed Mushrooms', category: 'mushrooms', size: '4 oz', price: 8, inventory: 20, active: true },
            { id: 'mush-8oz', name: 'Mixed Mushrooms', category: 'mushrooms', size: '8 oz', price: 15, inventory: 15, active: true },
            { id: 'mush-1lb', name: 'Mixed Mushrooms', category: 'mushrooms', size: '1 lb', price: 28, inventory: 10, active: true },
            { id: 'greens-1lb', name: 'Radish Greens', category: 'greens', size: '1 lb', price: 6, inventory: 25, active: true },
            { id: 'greens-2lb', name: 'Radish Greens', category: 'greens', size: '2 lb', price: 11, inventory: 15, active: true },
        ];

        // ==================== PROVIDERS ====================
        function CartProvider({ children }) {
            const { zones } = useDelivery();
            const [cart, setCart] = useState([]);
            const [deliveryZone, setDeliveryZone] = useState('');

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item =>
                            item.id === product.id
                                ? { ...item, quantity: item.quantity + 1 }
                                : item
                        );
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
            };

            const removeFromCart = (productId) => {
                setCart(prev => prev.filter(item => item.id !== productId));
            };

            const updateQuantity = (productId, quantity) => {
                if (quantity <= 0) {
                    removeFromCart(productId);
                    return;
                }
                setCart(prev => prev.map(item =>
                    item.id === productId ? { ...item, quantity } : item
                ));
            };

            const clearCart = () => {
                setCart([]);
                setDeliveryZone('');
            };

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const deliveryFee = deliveryZone ? zones[deliveryZone]?.fee || 0 : 0;
            const total = subtotal + deliveryFee;

            return (
                <CartContext.Provider value={{
                    cart,
                    addToCart,
                    removeFromCart,
                    updateQuantity,
                    clearCart,
                    subtotal,
                    deliveryFee,
                    total,
                    deliveryZone,
                    setDeliveryZone
                }}>
                    {children}
                </CartContext.Provider>
            );
        }

        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);

            useEffect(() => {
                const stored = localStorage.getItem('admin-user');
                if (stored) setUser(JSON.parse(stored));
            }, []);

            const login = async (username, password) => {
                // Check hardcoded fallback first
                if (username === 'admin' && password === 'admin') {
                    const userData = { username: 'admin', role: 'owner' };
                    setUser(userData);
                    localStorage.setItem('admin-user', JSON.stringify(userData));
                    return true;
                }
                // Check Supabase admin users
                try {
                    const result = await adminApi('loginUser', { username, password });
                    if (result.success && result.data) {
                        const userData = { id: result.data.id, username: result.data.username, role: result.data.role };
                        setUser(userData);
                        localStorage.setItem('admin-user', JSON.stringify(userData));
                        return true;
                    }
                } catch (err) {
                    console.error('Login error:', err);
                }
                return false;
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem('admin-user');
            };

            return (
                <AuthContext.Provider value={{ user, login, logout }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        function ProductProvider({ children }) {
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [loading, setLoading] = useState(true);

            // Fetch products from Supabase on mount
            useEffect(() => {
                async function fetchProducts() {
                    try {
                        const { data, error } = await supabaseClient
                            .from('farm_products')
                            .select('*')
                            .order('created_at', { ascending: true });
                        if (error) throw error;
                        if (data && data.length > 0) {
                            setProducts(data);
                        }
                    } catch (err) {
                        console.error('Failed to fetch products from Supabase:', err);
                        // Keep INITIAL_PRODUCTS as fallback
                    } finally {
                        setLoading(false);
                    }
                }
                fetchProducts();
            }, []);

            const addProduct = async (product) => {
                try {
                    const result = await adminApi('addProduct', product);
                    const newProduct = Array.isArray(result.data) ? result.data[0] : result.data;
                    setProducts(prev => [...prev, newProduct]);
                } catch (err) {
                    console.error('Failed to add product:', err);
                    // Fallback: add locally
                    const newProduct = { ...product, id: Date.now().toString() };
                    setProducts(prev => [...prev, newProduct]);
                }
            };

            const updateProduct = async (id, updates) => {
                // Optimistic update
                setProducts(prev => prev.map(p => p.id === id ? { ...p, ...updates } : p));
                try {
                    await adminApi('updateProduct', { id, ...updates });
                } catch (err) {
                    console.error('Failed to update product:', err);
                }
            };

            const deleteProduct = async (id) => {
                setProducts(prev => prev.filter(p => p.id !== id));
                try {
                    await adminApi('deleteProduct', { id });
                } catch (err) {
                    console.error('Failed to delete product:', err);
                }
            };

            const decrementInventory = async (id, quantity) => {
                setProducts(prev => prev.map(p =>
                    p.id === id ? { ...p, inventory: Math.max(0, p.inventory - quantity) } : p
                ));
                try {
                    await adminApi('decrementInventory', { id, quantity });
                } catch (err) {
                    console.error('Failed to decrement inventory:', err);
                }
            };

            return (
                <ProductContext.Provider value={{
                    products,
                    addProduct,
                    updateProduct,
                    deleteProduct,
                    decrementInventory,
                    loading
                }}>
                    {children}
                </ProductContext.Provider>
            );
        }

        function OrderProvider({ children }) {
            const [orders, setOrders] = useState([]);

            // Fetch orders from Supabase on mount
            useEffect(() => {
                async function fetchOrders() {
                    try {
                        const { data, error } = await supabaseClient
                            .from('farm_orders')
                            .select('*, farm_order_items(*)')
                            .order('created_at', { ascending: false });
                        if (error) throw error;
                        if (data) {
                            // Map to the format the app expects
                            const mapped = data.map(o => ({
                                id: o.id,
                                orderNumber: o.order_number,
                                date: o.created_at,
                                status: o.status,
                                customer: {
                                    name: o.customer_name,
                                    email: o.customer_email,
                                    phone: o.customer_phone,
                                    address: o.customer_address
                                },
                                deliveryZone: o.delivery_zone,
                                deliveryInfo: { name: o.delivery_zone, day: o.delivery_day },
                                paymentMethod: o.payment_method,
                                subtotal: o.subtotal,
                                deliveryFee: o.delivery_fee,
                                total: o.total,
                                items: (o.farm_order_items || []).map(item => ({
                                    id: item.product_id,
                                    name: item.product_name,
                                    size: item.product_size,
                                    price: item.price,
                                    quantity: item.quantity
                                }))
                            }));
                            setOrders(mapped);
                        }
                    } catch (err) {
                        console.error('Failed to fetch orders from Supabase:', err);
                    }
                }
                fetchOrders();
            }, []);

            const addOrder = async (order) => {
                const orderNumber = `SF${Date.now().toString().slice(-6)}`;
                const newOrder = {
                    ...order,
                    id: Date.now().toString(),
                    orderNumber,
                    date: new Date().toISOString(),
                    status: 'pending'
                };
                setOrders(prev => [newOrder, ...prev]);

                // Save to Supabase via admin API
                try {
                    const zoneInfo = order.deliveryInfo || {};
                    const result = await adminApi('addOrder', {
                        order_number: orderNumber,
                        customer_name: order.customer.name,
                        customer_email: order.customer.email,
                        customer_phone: order.customer.phone,
                        customer_address: order.customer.address,
                        delivery_zone: order.deliveryZone,
                        delivery_day: zoneInfo.day || '',
                        payment_method: order.paymentMethod,
                        subtotal: order.total - order.deliveryFee,
                        delivery_fee: order.deliveryFee,
                        total: order.total,
                        items: order.items.map(item => ({
                            product_id: item.id,
                            product_name: item.name,
                            product_size: item.size,
                            price: item.price,
                            quantity: item.quantity
                        }))
                    });
                    // Update the local order with the real Supabase ID
                    if (result.data) {
                        const realOrder = Array.isArray(result.data) ? result.data[0] : result.data;
                        setOrders(prev => prev.map(o =>
                            o.orderNumber === orderNumber ? { ...o, id: realOrder.id } : o
                        ));
                    }
                } catch (err) {
                    console.error('Failed to save order to Supabase:', err);
                }

                return newOrder;
            };

            const updateOrderStatus = async (id, status) => {
                setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
                try {
                    await adminApi('updateOrderStatus', { id, status });
                } catch (err) {
                    console.error('Failed to update order status:', err);
                }
            };

            return (
                <OrderContext.Provider value={{ orders, addOrder, updateOrderStatus }}>
                    {children}
                </OrderContext.Provider>
            );
        }

        function DeliveryProvider({ children }) {
            const [zones, setZones] = useState(DEFAULT_zones);
            const [infoCards, setInfoCards] = useState(DEFAULT_DELIVERY_INFO);

            // Fetch zones and info cards from Supabase on mount
            useEffect(() => {
                async function fetchDeliveryData() {
                    try {
                        const { data: zonesData, error: zonesError } = await supabaseClient
                            .from('farm_delivery_zones')
                            .select('*')
                            .order('created_at', { ascending: true });
                        if (zonesError) throw zonesError;
                        if (zonesData && zonesData.length > 0) {
                            const zonesObj = {};
                            zonesData.forEach(z => {
                                zonesObj[z.key] = { name: z.name, day: z.day, fee: z.fee };
                            });
                            setZones(zonesObj);
                        }
                    } catch (err) {
                        console.error('Failed to fetch delivery zones:', err);
                    }
                    try {
                        const { data: cardsData, error: cardsError } = await supabaseClient
                            .from('farm_delivery_info')
                            .select('*')
                            .order('sort_order', { ascending: true });
                        if (cardsError) throw cardsError;
                        if (cardsData && cardsData.length > 0) {
                            setInfoCards(cardsData.map(c => ({
                                id: c.id,
                                icon: c.icon,
                                title: c.title,
                                description: c.description
                            })));
                        }
                    } catch (err) {
                        console.error('Failed to fetch delivery info cards:', err);
                    }
                }
                fetchDeliveryData();
            }, []);

            const addZone = async (key, zone) => {
                setZones(prev => ({ ...prev, [key]: zone }));
                try {
                    await adminApi('addZone', { key, name: zone.name, day: zone.day, fee: zone.fee });
                } catch (err) {
                    console.error('Failed to add zone:', err);
                }
            };

            const updateZone = async (key, updates) => {
                setZones(prev => ({ ...prev, [key]: { ...prev[key], ...updates } }));
                try {
                    await adminApi('updateZone', { key, ...updates });
                } catch (err) {
                    console.error('Failed to update zone:', err);
                }
            };

            const deleteZone = async (key) => {
                setZones(prev => {
                    const next = { ...prev };
                    delete next[key];
                    return next;
                });
                try {
                    await adminApi('deleteZone', { key });
                } catch (err) {
                    console.error('Failed to delete zone:', err);
                }
            };

            const addInfoCard = async (card) => {
                const tempId = Date.now().toString();
                setInfoCards(prev => [...prev, { ...card, id: tempId }]);
                try {
                    const result = await adminApi('addInfoCard', { ...card, sort_order: infoCards.length });
                    const newCard = Array.isArray(result.data) ? result.data[0] : result.data;
                    // Replace temp id with real id
                    setInfoCards(prev => prev.map(c => c.id === tempId ? { ...c, id: newCard.id } : c));
                } catch (err) {
                    console.error('Failed to add info card:', err);
                }
            };

            const updateInfoCard = async (id, updates) => {
                setInfoCards(prev => prev.map(c => c.id === id ? { ...c, ...updates } : c));
                try {
                    await adminApi('updateInfoCard', { id, ...updates });
                } catch (err) {
                    console.error('Failed to update info card:', err);
                }
            };

            const deleteInfoCard = async (id) => {
                setInfoCards(prev => prev.filter(c => c.id !== id));
                try {
                    await adminApi('deleteInfoCard', { id });
                } catch (err) {
                    console.error('Failed to delete info card:', err);
                }
            };

            return (
                <DeliveryContext.Provider value={{
                    zones, addZone, updateZone, deleteZone,
                    infoCards, addInfoCard, updateInfoCard, deleteInfoCard
                }}>
                    {children}
                </DeliveryContext.Provider>
            );
        }

        // ==================== HOOKS ====================
        const useCart = () => useContext(CartContext);
        const useAuth = () => useContext(AuthContext);
        const useProducts = () => useContext(ProductContext);
        const useOrders = () => useContext(OrderContext);
        const useDelivery = () => useContext(DeliveryContext);

        // ==================== COMPONENTS ====================

        // Header Component
        function Header({ page, setPage }) {
            const { cart } = useCart();
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const handleNavClick = (target) => {
                setPage(target);
                setMobileMenuOpen(false);
            };

            return (
                <header className="bg-[#fdfcfa] sticky top-0 z-50" style={{borderBottom: '1px solid #e8e4dc'}}>
                    <div className="container mx-auto px-6 py-2">
                        <div className="flex items-center justify-between">
                            <div className="cursor-pointer flex-shrink-0" onClick={() => handleNavClick('home')}>
                                <img
                                    src="/logo.png"
                                    alt="Siskiyou Farmstead"
                                    className="w-14 h-14"
                                />
                            </div>
                            <nav className="hidden md:flex space-x-10">
                                <button onClick={() => setPage('home')} className="nav-link">Home</button>
                                <button onClick={() => setPage('shop')} className="nav-link">Shop</button>
                                <button onClick={() => setPage('about')} className="nav-link">About</button>
                                <button onClick={() => setPage('blog')} className="nav-link">Blog</button>
                                <button onClick={() => setPage('contact')} className="nav-link">Contact</button>
                                <button onClick={() => setPage('newsletter')} className="nav-link">Newsletter</button>
                            </nav>
                            <div className="flex items-center space-x-5">
                                <button
                                    onClick={() => setPage('cart')}
                                    className="relative p-2 hover:bg-[#faf8f4] rounded-lg transition-colors"
                                >
                                    <svg className="w-6 h-6 text-[#555]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                                    </svg>
                                    {cartCount > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-[#5a7c65] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                            {cartCount}
                                        </span>
                                    )}
                                </button>
                                <button
                                    onClick={() => setPage('admin')}
                                    className="nav-link text-[#999] hover:text-[#555]"
                                >
                                    Admin
                                </button>
                                <button
                                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                    className="md:hidden p-2 hover:bg-[#faf8f4] rounded-lg transition-colors"
                                    aria-label="Toggle menu"
                                >
                                    <svg className="w-6 h-6 text-[#555]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        {mobileMenuOpen ? (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        ) : (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                        )}
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    {mobileMenuOpen && (
                        <nav className="md:hidden bg-[#fdfcfa]" style={{borderTop: '1px solid #e8e4dc'}}>
                            <div className="flex flex-col">
                                <button onClick={() => handleNavClick('home')} className="nav-link text-left w-full px-6 py-3 hover:bg-[#faf8f4]">Home</button>
                                <button onClick={() => handleNavClick('shop')} className="nav-link text-left w-full px-6 py-3 hover:bg-[#faf8f4]">Shop</button>
                                <button onClick={() => handleNavClick('about')} className="nav-link text-left w-full px-6 py-3 hover:bg-[#faf8f4]">About</button>
                                <button onClick={() => handleNavClick('blog')} className="nav-link text-left w-full px-6 py-3 hover:bg-[#faf8f4]">Blog</button>
                                <button onClick={() => handleNavClick('contact')} className="nav-link text-left w-full px-6 py-3 hover:bg-[#faf8f4]">Contact</button>
                                <button onClick={() => handleNavClick('newsletter')} className="nav-link text-left w-full px-6 py-3 hover:bg-[#faf8f4]">Newsletter</button>
                            </div>
                        </nav>
                    )}
                </header>
            );
        }

        // Footer Component
        function Footer({ setPage }) {
            return (
                <footer className="bg-[#f5f1eb]" style={{borderTop: '1px solid #e8e4dc'}}>

        // Admin Products Tab
        function AdminProducts() {
            const { products, addProduct, updateProduct, deleteProduct } = useProducts();
            const [showForm, setShowForm] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [imagePreview, setImagePreview] = useState(null);
            const [formData, setFormData] = useState({
                name: '',
                category: 'mushrooms',
                size: '',
                price: '',
                inventory: '',
                active: true,
                image_url: ''
            });

            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setImagePreview(ev.target.result);
                reader.readAsDataURL(file);
            };

            const uploadImage = async () => {
                if (!imagePreview) return formData.image_url || '';
                setUploading(true);
                try {
                    const base64 = imagePreview.split(',')[1];
                    const match = imagePreview.match(/data:([^;]+);/);
                    const contentType = match ? match[1] : 'image/jpeg';
                    const ext = contentType.split('/')[1] || 'jpg';
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64, fileName: `product.${ext}`, contentType })
                    });
                    const data = await res.json();
                    if (data.success) return data.url;
                    throw new Error(data.error);
                } catch (err) {
                    alert('Image upload failed: ' + err.message);
                    return formData.image_url || '';
                } finally {
                    setUploading(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const imageUrl = await uploadImage();
                const productData = {
                    ...formData,
                    price: parseFloat(formData.price),
                    inventory: parseInt(formData.inventory),
                    image_url: imageUrl
                };

                if (editingProduct) {
                    updateProduct(editingProduct.id, productData);
                } else {
                    addProduct(productData);
                }

        function AdminUsers() {
            const [users, setUsers] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ username: '', password: '', role: 'staff' });

            // Fetch users from Supabase on mount
            useEffect(() => {
                async function fetchUsers() {
                    try {
                        const result = await adminApi('getUsers', {});
                        if (result.success && Array.isArray(result.data)) {
                            setUsers(result.data.map(u => ({
                                id: u.id,
                                username: u.username,
                                role: u.role
                            })));
                        }
                    } catch (err) {
                        console.error('Failed to fetch admin users:', err);
                    }
                }
                fetchUsers();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const result = await adminApi('addUser', formData);
                    const newUser = Array.isArray(result.data) ? result.data[0] : result.data;
                    setUsers(prev => [...prev, { id: newUser.id, username: newUser.username, role: newUser.role }]);
                } catch (err) {
                    console.error('Failed to add user:', err);
                    // Fallback: add locally with temp id
                    setUsers(prev => [...prev, { ...formData, id: Date.now().toString() }]);
                }
                setFormData({ username: '', password: '', role: 'staff' });
                setShowForm(false);
            };

            const deleteUser = async (id) => {
                setUsers(users.filter(u => u.id !== id));
                try {
                    await adminApi('deleteUser', { id });
                } catch (err) {
                    console.error('Failed to delete user:', err);
                }
            };

            return (
                <div>
                    <div className="flex justify-between items-center mb-6">

        // ==================== ADMIN BLOG & SUBSCRIBERS ====================

        // Admin Blog Tab
        function AdminBlog() {
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingPost, setEditingPost] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [imagePreview, setImagePreview] = useState(null);
            const [formData, setFormData] = useState({
                title: '',
                slug: '',
                excerpt: '',
                content: '',
                image_url: '',
                published: false
            });

            useEffect(() => {
                fetchPosts();
            }, []);

            const fetchPosts = async () => {
                try {
                    const result = await adminApi('getBlogPosts', {});
                    if (result.success && Array.isArray(result.data)) {
                        setPosts(result.data);
                    }
                } catch (err) {
                    console.error('Failed to fetch blog posts:', err);
                } finally {
                    setLoading(false);
                }
            };

            const generateSlug = (title) => {
                return title
                    .toLowerCase()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .trim();
            };

            const handleTitleChange = (title) => {
                setFormData(prev => ({
                    ...prev,
                    title,
                    slug: !editingPost ? generateSlug(title) : prev.slug
                }));
            };

            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setImagePreview(ev.target.result);
                reader.readAsDataURL(file);
            };

            const uploadImage = async () => {
                if (!imagePreview) return formData.image_url || '';
                setUploading(true);
                try {
                    const base64 = imagePreview.split(',')[1];
                    const match = imagePreview.match(/data:([^;]+);/);
                    const contentType = match ? match[1] : 'image/jpeg';
                    const ext = contentType.split('/')[1] || 'jpg';
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64, fileName: `blog-${Date.now()}.${ext}`, contentType })
                    });
                    const data = await res.json();
                    if (data.success) return data.url;
                    throw new Error(data.error);
                } catch (err) {
                    alert('Image upload failed: ' + err.message);
                    return formData.image_url || '';
                } finally {
                    setUploading(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const imageUrl = await uploadImage();
                const postData = {
                    title: formData.title,
                    slug: formData.slug,
                    excerpt: formData.excerpt,
                    content: formData.content,
                    image_url: imageUrl,
                    published: formData.published
                };

                try {
                    if (editingPost) {
                        await adminApi('updateBlogPost', { id: editingPost.id, ...postData });
                    } else {
                        await adminApi('addBlogPost', postData);
                    }
                    await fetchPosts();
                } catch (err) {
                    console.error('Failed to save blog post:', err);
                    alert('Failed to save post: ' + err.message);
                }

                resetForm();
            };

            const resetForm = () => {
                setFormData({ title: '', slug: '', excerpt: '', content: '', image_url: '', published: false });
                setImagePreview(null);
                setShowForm(false);
                setEditingPost(null);
            };

            const handleEdit = (post) => {
                setEditingPost(post);
                setFormData({
                    title: post.title,
                    slug: post.slug,
                    excerpt: post.excerpt || '',
                    content: post.content || '',
                    image_url: post.image_url || '',
                    published: post.published
                });
                setImagePreview(post.image_url || null);
                setShowForm(true);
            };

            const handleDelete = async (id) => {
                if (!confirm('Delete this blog post? This cannot be undone.')) return;
                try {
                    await adminApi('deleteBlogPost', { id });
                    setPosts(prev => prev.filter(p => p.id !== id));
                } catch (err) {
                    console.error('Failed to delete blog post:', err);
                    alert('Failed to delete post: ' + err.message);
                }
            };

            if (loading) {
                return <div className="text-center py-12 text-gray-500">Loading blog posts...</div>;
            }

            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Blog Posts</h2>
                        <button
                            onClick={() => { if (showForm) { resetForm(); } else { setShowForm(true); } }}
                            className="btn-primary text-white px-4 py-2 rounded-lg"
                        >
                            {showForm ? 'Cancel' : '+ Add Post'}
                        </button>
                    </div>

                    {showForm && (
                        <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
                            <h3 className="text-xl font-bold mb-4">
                                {editingPost ? 'Edit Post' : 'Add New Post'}
                            </h3>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="grid md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Title</label>
                                        <input
                                            type="text"
                                            value={formData.title}
                                            onChange={(e) => handleTitleChange(e.target.value)}
                                            className="w-full border rounded px-3 py-2"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Slug</label>
                                        <input
                                            type="text"
                                            value={formData.slug}
                                            onChange={(e) => setFormData({...formData, slug: e.target.value})}
                                            className="w-full border rounded px-3 py-2"
                                            required
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Excerpt</label>
                                    <input
                                        type="text"
                                        value={formData.excerpt}
                                        onChange={(e) => setFormData({...formData, excerpt: e.target.value})}
                                        className="w-full border rounded px-3 py-2"
                                        placeholder="Short description for the blog listing"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Content</label>
                                    <textarea
                                        value={formData.content}
                                        onChange={(e) => setFormData({...formData, content: e.target.value})}
                                        rows={12}
                                        className="w-full border rounded px-3 py-2 resize-vertical"
                                        placeholder="Write your blog post content here. Separate paragraphs with blank lines."
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Featured Image</label>
                                    <div className="flex items-center gap-4">
                                        <label className="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded border border-gray-300 text-sm transition-colors">
                                            Choose Photo
                                            <input
                                                type="file"
                                                accept="image/*"
                                                onChange={handleImageSelect}
                                                className="hidden"
                                            />
                                        </label>
                                        {(imagePreview || formData.image_url) && (
                                            <div className="flex items-center gap-3">
                                                <img
                                                    src={imagePreview || formData.image_url}
                                                    alt="Preview"
                                                    className="w-16 h-16 object-cover rounded border"
                                                />
                                                <button
                                                    type="button"
                                                    onClick={() => { setImagePreview(null); setFormData({...formData, image_url: ''}); }}
                                                    className="text-red-600 hover:text-red-800 text-sm"
                                                >
                                                    Remove
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex items-center">
                                    <label className="flex items-center cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={formData.published}
                                            onChange={(e) => setFormData({...formData, published: e.target.checked})}
                                            className="mr-2"
                                        />
                                        <span className="text-sm font-medium">Published</span>
                                    </label>
                                </div>
                                <div>
                                    <button type="submit" disabled={uploading} className="btn-primary text-white px-6 py-2 rounded-lg">
                                        {uploading ? 'Uploading image...' : editingPost ? 'Update Post' : 'Add Post'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-sm overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Title</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Status</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Date</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {posts.length === 0 ? (
                                    <tr>
                                        <td colSpan="4" className="px-4 py-8 text-center text-gray-500">No blog posts yet.</td>
                                    </tr>
                                ) : posts.map(post => (
                                    <tr key={post.id} className="border-t">
                                        <td className="px-4 py-3 font-medium">{post.title}</td>
                                        <td className="px-4 py-3">
                                            <span className={`px-2 py-1 rounded text-xs ${
                                                post.published
                                                    ? 'bg-green-100 text-green-800'
                                                    : 'bg-yellow-100 text-yellow-800'
                                            }`}>
                                                {post.published ? 'Published' : 'Draft'}
                                            </span>
                                        </td>
                                        <td className="px-4 py-3 text-sm text-gray-600">
                                            {post.published_at
                                                ? new Date(post.published_at).toLocaleDateString()
                                                : post.created_at
                                                ? new Date(post.created_at).toLocaleDateString()
                                                : '-'}
                                        </td>
                                        <td className="px-4 py-3">
                                            <div className="flex space-x-2">
                                                <button
                                                    onClick={() => handleEdit(post)}
                                                    className="text-blue-600 hover:text-blue-800 text-sm"
                                                >
                                                    Edit
                                                </button>
                                                <button
                                                    onClick={() => handleDelete(post.id)}
                                                    className="text-red-600 hover:text-red-800 text-sm"
                                                >
                                                    Delete
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

                fetchSubscribers();

                        setSubscribers(result.data);
                    }
                } catch (err) {
                    console.error('Failed to fetch subscribers:', err);
                } finally {
                    setLoading(false);
                }
            };

            const handleToggle = async (id) => {
                try {
                    await adminApi('toggleSubscriber', { id });
                    setSubscribers(prev => prev.map(s =>
                        s.id === id ? { ...s, active: !s.active } : s
                    ));
                } catch (err) {
                    console.error('Failed to toggle subscriber:', err);
                    alert('Failed to update subscriber: ' + err.message);
                }

                try {
                    await adminApi('deleteSubscriber', { id });
                    setSubscribers(prev => prev.filter(s => s.id !== id));
                } catch (err) {
                    console.error('Failed to delete subscriber:', err);
                    alert('Failed to delete subscriber: ' + err.message);

                                    <th className="px-4 py-3 text-left text-sm font-medium">Status</th>

        // ==================== ROUTING ====================
        function getPageFromHash() {
            const hash = window.location.hash.replace('#/', '').replace('#', '');
            return hash || 'home';
        }

        function navigate(page) {
            window.location.hash = '#/' + page;
        }

        // ==================== MAIN APP ====================
        function App() {
            const [page, setPageState] = useState(getPageFromHash);
            const { user } = useAuth();

            const setPage = useCallback((p) => {
                navigate(p);
            }, []);

            useEffect(() => {
                const onHashChange = () => {
                    setPageState(getPageFromHash());
                    window.scrollTo(0, 0);
                };
                window.addEventListener('hashchange', onHashChange);
                return () => window.removeEventListener('hashchange', onHashChange);
            }, []);

            // Admin pages
            if (page === 'admin' || page === 'admin-dashboard') {
                return user ? <AdminDashboard setPage={setPage} /> : <AdminLogin setPage={setPage} />;
            }
            if (page.startsWith('admin-')) {
                return user ? <AdminDashboard setPage={setPage} initialTab={page.replace('admin-', '')} /> : <AdminLogin setPage={setPage} />;
            }

            // Customer pages
            return (
                <div className="flex flex-col min-h-screen">
                    <Header page={page} setPage={setPage} />
                    <main className="flex-1">
                        {page === 'home' && <HomePage setPage={setPage} />}
                        {page === 'shop' && <ShopPage />}
                        {page === 'cart' && <CartPage setPage={setPage} />}
                        {page === 'checkout' && <CheckoutPage setPage={setPage} />}
                        {page === 'order-confirmation' && <OrderConfirmationPage setPage={setPage} />}
                        {page === 'about' && <AboutPage />}
                        {page === 'blog' && <BlogPage setPage={setPage} />}
                        {page.startsWith('blog-') && page !== 'blog' && <BlogPostPage slug={page.replace('blog-', '')} setPage={setPage} />}
                        {page === 'contact' && <ContactPage />}
                        {page === 'newsletter' && <NewsletterPage />}
                    </main>
                    <Footer setPage={setPage} />
                </div>
            );
        }

        // Root Render
        function Root() {
            return (
                <AuthProvider>
                    <ProductProvider>
                        <OrderProvider>
                            <DeliveryProvider>
                                <CartProvider>
                                    <App />
                                </CartProvider>
                            </DeliveryProvider>
                        </OrderProvider>
                    </ProductProvider>
                </AuthProvider>
            );
        }

        ReactDOM.render(<Root />, document.getElementById('root'));
    </script>
</body>
</html>
