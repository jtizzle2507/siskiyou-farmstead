<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siskiyou Farmstead - Greens & Mushrooms</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Georgia', serif;
        }
        .logo-container {
            max-width: 200px;
            margin: 0 auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c6a46 0%, #5a4a2a 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 106, 70, 0.4);
        }
        .product-card {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border-color: #7c6a46;
        }
        .delivery-badge {
            background: linear-gradient(135deg, #4a7c59 0%, #2d5a3a 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useCallback } = React;

        // ==================== CONTEXTS ====================
        const CartContext = createContext();
        const AuthContext = createContext();
        const ProductContext = createContext();
        const OrderContext = createContext();

        // ==================== INITIAL DATA ====================
        const DELIVERY_ZONES = {
            'hilt-hornbrook': { name: 'Hilt / Hornbrook', day: 'Monday', fee: 2 },
            'weed-shastina': { name: 'Weed / Lake Shastina', day: 'Tuesday', fee: 2 },
            'mtshasta-dunsmuir': { name: 'Mt Shasta / Dunsmuir / McCloud', day: 'Wednesday', fee: 2 },
            'yreka-grenada': { name: 'Yreka / Grenada / Montague', day: 'Thursday', fee: 2 },
            'fortjones-etna': { name: 'Fort Jones / Greenview / Quartz Valley / Etna', day: 'Friday', fee: 2 },
            'pickup': { name: 'Yreka Pickup (Sunday)', day: 'Sunday', fee: 0 }
        };

        const INITIAL_PRODUCTS = [
            { id: 'mush-4oz', name: 'Mixed Mushrooms', category: 'mushrooms', size: '4 oz', price: 8, inventory: 20, active: true },
            { id: 'mush-8oz', name: 'Mixed Mushrooms', category: 'mushrooms', size: '8 oz', price: 15, inventory: 15, active: true },
            { id: 'mush-1lb', name: 'Mixed Mushrooms', category: 'mushrooms', size: '1 lb', price: 28, inventory: 10, active: true },
            { id: 'greens-1lb', name: 'Radish Greens', category: 'greens', size: '1 lb', price: 6, inventory: 25, active: true },
            { id: 'greens-2lb', name: 'Radish Greens', category: 'greens', size: '2 lb', price: 11, inventory: 15, active: true },
        ];

        // ==================== PROVIDERS ====================
        function CartProvider({ children }) {
            const [cart, setCart] = useState([]);
            const [deliveryZone, setDeliveryZone] = useState('');

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => 
                            item.id === product.id 
                                ? { ...item, quantity: item.quantity + 1 }
                                : item
                        );
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
            };

            const removeFromCart = (productId) => {
                setCart(prev => prev.filter(item => item.id !== productId));
            };

            const updateQuantity = (productId, quantity) => {
                if (quantity <= 0) {
                    removeFromCart(productId);
                    return;
                }
                setCart(prev => prev.map(item => 
                    item.id === productId ? { ...item, quantity } : item
                ));
            };

            const clearCart = () => {
                setCart([]);
                setDeliveryZone('');
            };

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const deliveryFee = deliveryZone ? DELIVERY_ZONES[deliveryZone]?.fee || 0 : 0;
            const total = subtotal + deliveryFee;

            return (
                <CartContext.Provider value={{ 
                    cart, 
                    addToCart, 
                    removeFromCart, 
                    updateQuantity, 
                    clearCart,
                    subtotal,
                    deliveryFee,
                    total,
                    deliveryZone,
                    setDeliveryZone
                }}>
                    {children}
                </CartContext.Provider>
            );
        }

        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);

            useEffect(() => {
                const stored = localStorage.getItem('admin-user');
                if (stored) setUser(JSON.parse(stored));
            }, []);

            const login = (username, password) => {
                // Simple demo auth - replace with real auth
                const users = JSON.parse(localStorage.getItem('admin-users') || '[]');
                const found = users.find(u => u.username === username && u.password === password);
                
                if (found || (username === 'admin' && password === 'admin')) {
                    const userData = found || { username: 'admin', role: 'owner' };
                    setUser(userData);
                    localStorage.setItem('admin-user', JSON.stringify(userData));
                    return true;
                }
                return false;
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem('admin-user');
            };

            return (
                <AuthContext.Provider value={{ user, login, logout }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        function ProductProvider({ children }) {
            const [products, setProducts] = useState(() => {
                const stored = localStorage.getItem('products');
                return stored ? JSON.parse(stored) : INITIAL_PRODUCTS;
            });

            useEffect(() => {
                localStorage.setItem('products', JSON.stringify(products));
            }, [products]);

            const addProduct = (product) => {
                const newProduct = { ...product, id: Date.now().toString() };
                setProducts(prev => [...prev, newProduct]);
            };

            const updateProduct = (id, updates) => {
                setProducts(prev => prev.map(p => p.id === id ? { ...p, ...updates } : p));
            };

            const deleteProduct = (id) => {
                setProducts(prev => prev.filter(p => p.id !== id));
            };

            const decrementInventory = (id, quantity) => {
                setProducts(prev => prev.map(p => 
                    p.id === id ? { ...p, inventory: Math.max(0, p.inventory - quantity) } : p
                ));
            };

            return (
                <ProductContext.Provider value={{ 
                    products, 
                    addProduct, 
                    updateProduct, 
                    deleteProduct,
                    decrementInventory
                }}>
                    {children}
                </ProductContext.Provider>
            );
        }

        function OrderProvider({ children }) {
            const [orders, setOrders] = useState(() => {
                const stored = localStorage.getItem('orders');
                return stored ? JSON.parse(stored) : [];
            });

            useEffect(() => {
                localStorage.setItem('orders', JSON.stringify(orders));
            }, [orders]);

            const addOrder = (order) => {
                const newOrder = {
                    ...order,
                    id: Date.now().toString(),
                    orderNumber: `SF${Date.now().toString().slice(-6)}`,
                    date: new Date().toISOString(),
                    status: 'pending'
                };
                setOrders(prev => [newOrder, ...prev]);
                return newOrder;
            };

            const updateOrderStatus = (id, status) => {
                setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
            };

            return (
                <OrderContext.Provider value={{ orders, addOrder, updateOrderStatus }}>
                    {children}
                </OrderContext.Provider>
            );
        }

        // ==================== HOOKS ====================
        const useCart = () => useContext(CartContext);
        const useAuth = () => useContext(AuthContext);
        const useProducts = () => useContext(ProductContext);
        const useOrders = () => useContext(OrderContext);

        // ==================== COMPONENTS ====================

        // Header Component
        function Header({ page, setPage }) {
            const { cart } = useCart();
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            return (
                <header className="bg-white shadow-md sticky top-0 z-50">
                    <div className="container mx-auto px-4 py-4">
                        <div className="flex items-center justify-between">
                            <div className="logo-container cursor-pointer" onClick={() => setPage('home')}>
                                <img 
                                    src="/logo.png" 
                                    alt="Siskiyou Farmstead" 
                                    className="w-16 h-16"
                                />
                            </div>
                            <nav className="hidden md:flex space-x-6">
                                <button onClick={() => setPage('home')} className="text-gray-700 hover:text-green-700 font-medium">Home</button>
                                <button onClick={() => setPage('shop')} className="text-gray-700 hover:text-green-700 font-medium">Shop</button>
                                <button onClick={() => setPage('about')} className="text-gray-700 hover:text-green-700 font-medium">About</button>
                            </nav>
                            <div className="flex items-center space-x-4">
                                <button 
                                    onClick={() => setPage('cart')} 
                                    className="relative p-2 hover:bg-gray-100 rounded-lg"
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                                    </svg>
                                    {cartCount > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-green-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                            {cartCount}
                                        </span>
                                    )}
                                </button>
                                <button 
                                    onClick={() => setPage('admin')} 
                                    className="text-sm text-gray-600 hover:text-gray-900"
                                >
                                    Admin
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // Home Page
        function HomePage({ setPage }) {
            const { products } = useProducts();
            const featuredProducts = products.filter(p => p.active).slice(0, 3);

            return (
                <div className="min-h-screen">
                    {/* Hero Section */}
                    <div className="bg-gradient-to-r from-green-800 to-green-600 text-white py-20">
                        <div className="container mx-auto px-4 text-center">
                            <h1 className="text-5xl font-bold mb-4">Siskiyou Farmstead</h1>
                            <p className="text-xl mb-2">Fresh Greens & Mushrooms</p>
                            <p className="text-lg opacity-90 mb-8">Locally grown in Siskiyou County</p>
                            <button 
                                onClick={() => setPage('shop')}
                                className="btn-primary text-white px-8 py-3 rounded-lg text-lg font-semibold"
                            >
                                Shop Now
                            </button>
                        </div>
                    </div>

                    {/* Delivery Info */}
                    <div className="bg-white py-12">
                        <div className="container mx-auto px-4">
                            <h2 className="text-3xl font-bold text-center mb-8 text-gray-800">Delivery Schedule</h2>
                            <div className="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                                <div className="text-center p-6 bg-green-50 rounded-lg">
                                    <div className="text-4xl mb-3">📦</div>
                                    <h3 className="font-bold text-lg mb-2">$25 Minimum</h3>
                                    <p className="text-gray-600">All orders</p>
                                </div>
                                <div className="text-center p-6 bg-green-50 rounded-lg">
                                    <div className="text-4xl mb-3">🚚</div>
                                    <h3 className="font-bold text-lg mb-2">$2 Delivery</h3>
                                    <p className="text-gray-600">To your zone</p>
                                </div>
                                <div className="text-center p-6 bg-green-50 rounded-lg">
                                    <div className="text-4xl mb-3">🏡</div>
                                    <h3 className="font-bold text-lg mb-2">Free Pickup</h3>
                                    <p className="text-gray-600">Sundays in Yreka</p>
                                </div>
                            </div>
                            <div className="mt-8 max-w-2xl mx-auto bg-gray-50 p-6 rounded-lg">
                                <h3 className="font-bold text-lg mb-4 text-center">Weekly Delivery Days</h3>
                                <div className="space-y-2 text-sm">
                                    <div className="flex justify-between"><span className="font-medium">Monday:</span><span>Hilt / Hornbrook</span></div>
                                    <div className="flex justify-between"><span className="font-medium">Tuesday:</span><span>Weed / Lake Shastina</span></div>
                                    <div className="flex justify-between"><span className="font-medium">Wednesday:</span><span>Mt Shasta / Dunsmuir / McCloud</span></div>
                                    <div className="flex justify-between"><span className="font-medium">Thursday:</span><span>Yreka / Grenada / Montague</span></div>
                                    <div className="flex justify-between"><span className="font-medium">Friday:</span><span>Fort Jones / Greenview / Quartz Valley / Etna</span></div>
                                    <div className="flex justify-between"><span className="font-medium">Sunday:</span><span>Yreka Pickup (Cash Accepted)</span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Featured Products */}
                    <div className="py-12 bg-gray-50">
                        <div className="container mx-auto px-4">
                            <h2 className="text-3xl font-bold text-center mb-8 text-gray-800">Featured Products</h2>
                            <div className="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                {featuredProducts.map(product => (
                                    <ProductCard key={product.id} product={product} />
                                ))}
                            </div>
                            <div className="text-center mt-8">
                                <button 
                                    onClick={() => setPage('shop')}
                                    className="btn-primary text-white px-6 py-2 rounded-lg font-semibold"
                                >
                                    View All Products
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Product Card
        function ProductCard({ product }) {
            const { addToCart } = useCart();
            const [added, setAdded] = useState(false);

            const handleAddToCart = () => {
                addToCart(product);
                setAdded(true);
                setTimeout(() => setAdded(false), 2000);
            };

            const isOutOfStock = product.inventory <= 0;

            return (
                <div className="product-card bg-white rounded-lg p-4 shadow-sm">
                    <div className="mb-3">
                        <h3 className="font-bold text-lg text-gray-800">{product.name}</h3>
                        <p className="text-gray-600 text-sm">{product.size}</p>
                    </div>
                    <div className="flex items-center justify-between mb-3">
                        <span className="text-2xl font-bold text-green-700">${product.price}</span>
                        <span className="text-sm text-gray-500">
                            {isOutOfStock ? (
                                <span className="text-red-600 font-medium">Out of Stock</span>
                            ) : (
                                `${product.inventory} available`
                            )}
                        </span>
                    </div>
                    <button 
                        onClick={handleAddToCart}
                        disabled={isOutOfStock || !product.active}
                        className={`w-full py-2 rounded-lg font-semibold transition-colors ${
                            isOutOfStock || !product.active
                                ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                : added
                                ? 'bg-green-600 text-white'
                                : 'btn-primary text-white hover:bg-green-700'
                        }`}
                    >
                        {added ? '✓ Added to Cart' : isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                    </button>
                </div>
            );
        }

        // Shop Page
        function ShopPage() {
            const { products } = useProducts();
            const [filter, setFilter] = useState('all');

            const categories = ['all', 'mushrooms', 'greens', 'herbs'];
            const filteredProducts = filter === 'all' 
                ? products.filter(p => p.active)
                : products.filter(p => p.active && p.category === filter);

            return (
                <div className="container mx-auto px-4 py-8">
                    <h1 className="text-4xl font-bold mb-8 text-gray-800">Shop</h1>
                    
                    {/* Category Filter */}
                    <div className="flex space-x-4 mb-8">
                        {categories.map(cat => (
                            <button
                                key={cat}
                                onClick={() => setFilter(cat)}
                                className={`px-4 py-2 rounded-lg font-medium capitalize ${
                                    filter === cat 
                                        ? 'bg-green-700 text-white' 
                                        : 'bg-white text-gray-700 hover:bg-gray-100'
                                }`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    {/* Products Grid */}
                    <div className="grid md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {filteredProducts.map(product => (
                            <ProductCard key={product.id} product={product} />
                        ))}
                    </div>

                    {filteredProducts.length === 0 && (
                        <div className="text-center py-12 text-gray-500">
                            No products available in this category.
                        </div>
                    )}
                </div>
            );
        }

        // Cart Page
        function CartPage({ setPage }) {
            const { cart, removeFromCart, updateQuantity, subtotal, total, deliveryFee } = useCart();

            if (cart.length === 0) {
                return (
                    <div className="container mx-auto px-4 py-12 text-center">
                        <h1 className="text-3xl font-bold mb-4">Your Cart is Empty</h1>
                        <p className="text-gray-600 mb-8">Add some fresh products to get started!</p>
                        <button 
                            onClick={() => setPage('shop')}
                            className="btn-primary text-white px-6 py-3 rounded-lg"
                        >
                            Continue Shopping
                        </button>
                    </div>
                );
            }

            return (
                <div className="container mx-auto px-4 py-8">
                    <h1 className="text-3xl font-bold mb-8">Shopping Cart</h1>
                    
                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            {cart.map(item => (
                                <div key={item.id} className="bg-white rounded-lg p-4 mb-4 shadow-sm flex items-center justify-between">
                                    <div className="flex-1">
                                        <h3 className="font-bold text-lg">{item.name}</h3>
                                        <p className="text-gray-600 text-sm">{item.size}</p>
                                        <p className="text-green-700 font-bold mt-1">${item.price}</p>
                                    </div>
                                    <div className="flex items-center space-x-4">
                                        <div className="flex items-center space-x-2">
                                            <button 
                                                onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                className="w-8 h-8 rounded bg-gray-200 hover:bg-gray-300"
                                            >
                                                -
                                            </button>
                                            <span className="w-8 text-center font-medium">{item.quantity}</span>
                                            <button 
                                                onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                className="w-8 h-8 rounded bg-gray-200 hover:bg-gray-300"
                                            >
                                                +
                                            </button>
                                        </div>
                                        <button 
                                            onClick={() => removeFromCart(item.id)}
                                            className="text-red-600 hover:text-red-800"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div>
                            <div className="bg-white rounded-lg p-6 shadow-sm sticky top-24">
                                <h2 className="text-xl font-bold mb-4">Order Summary</h2>
                                <div className="space-y-2 mb-4">
                                    <div className="flex justify-between">
                                        <span>Subtotal:</span>
                                        <span className="font-medium">${subtotal.toFixed(2)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Delivery Fee:</span>
                                        <span className="font-medium">${deliveryFee.toFixed(2)}</span>
                                    </div>
                                    <div className="border-t pt-2 flex justify-between text-lg font-bold">
                                        <span>Total:</span>
                                        <span className="text-green-700">${total.toFixed(2)}</span>
                                    </div>
                                </div>
                                
                                {subtotal < 25 && (
                                    <div className="bg-yellow-50 border border-yellow-200 rounded p-3 mb-4 text-sm">
                                        <p className="text-yellow-800">
                                            Add ${(25 - subtotal).toFixed(2)} more to reach the $25 minimum.
                                        </p>
                                    </div>
                                )}

                                <button 
                                    onClick={() => setPage('checkout')}
                                    disabled={subtotal < 25}
                                    className={`w-full py-3 rounded-lg font-semibold ${
                                        subtotal < 25
                                            ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                            : 'btn-primary text-white'
                                    }`}
                                >
                                    Proceed to Checkout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Checkout Page
        function CheckoutPage({ setPage }) {
            const { cart, total, deliveryZone, setDeliveryZone, clearCart, deliveryFee } = useCart();
            const { addOrder } = useOrders();
            const { decrementInventory } = useProducts();
            const [paymentMethod, setPaymentMethod] = useState('');
            const [customerInfo, setCustomerInfo] = useState({
                name: '',
                email: '',
                phone: '',
                address: ''
            });
            const [processing, setProcessing] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setProcessing(true);

                // Simulate payment processing
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Create order
                const order = {
                    items: cart,
                    customer: customerInfo,
                    deliveryZone: deliveryZone,
                    deliveryInfo: DELIVERY_ZONES[deliveryZone],
                    paymentMethod,
                    total,
                    deliveryFee
                };

                const newOrder = addOrder(order);

                // Update inventory
                cart.forEach(item => {
                    decrementInventory(item.id, item.quantity);
                });

                // Send confirmation email (mock)
                console.log('Sending confirmation email to:', customerInfo.email);
                
                clearCart();
                setPage('order-confirmation');
                setProcessing(false);
            };

            return (
                <div className="container mx-auto px-4 py-8">
                    <h1 className="text-3xl font-bold mb-8">Checkout</h1>
                    
                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            <form onSubmit={handleSubmit} className="space-y-6">
                                {/* Customer Information */}
                                <div className="bg-white rounded-lg p-6 shadow-sm">
                                    <h2 className="text-xl font-bold mb-4">Customer Information</h2>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <input
                                            type="text"
                                            placeholder="Full Name"
                                            required
                                            value={customerInfo.name}
                                            onChange={(e) => setCustomerInfo({...customerInfo, name: e.target.value})}
                                            className="border rounded px-3 py-2"
                                        />
                                        <input
                                            type="email"
                                            placeholder="Email"
                                            required
                                            value={customerInfo.email}
                                            onChange={(e) => setCustomerInfo({...customerInfo, email: e.target.value})}
                                            className="border rounded px-3 py-2"
                                        />
                                        <input
                                            type="tel"
                                            placeholder="Phone"
                                            required
                                            value={customerInfo.phone}
                                            onChange={(e) => setCustomerInfo({...customerInfo, phone: e.target.value})}
                                            className="border rounded px-3 py-2"
                                        />
                                        <input
                                            type="text"
                                            placeholder="Delivery Address"
                                            required
                                            value={customerInfo.address}
                                            onChange={(e) => setCustomerInfo({...customerInfo, address: e.target.value})}
                                            className="border rounded px-3 py-2"
                                        />
                                    </div>
                                </div>

                                {/* Delivery Zone Selection */}
                                <div className="bg-white rounded-lg p-6 shadow-sm">
                                    <h2 className="text-xl font-bold mb-4">Select Delivery Zone</h2>
                                    <div className="space-y-3">

                    updateProduct(editingProduct.id, productData);

                    addProduct(productData);

            const [showForm, setShowForm] = useState(false);

                localStorage.setItem('admin-users', JSON.stringify(users));

                setFormData({ username: '', password: '', role: 'staff' });

                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Password</label>
                                    <input
                                        type="password"
                                        value={formData.password}
                                        onChange={(e) => setFormData({...formData, password: e.target.value})}
                                        className="w-full border rounded px-3 py-2"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Role</label>
                                    <select
                                        value={formData.role}
                                        onChange={(e) => setFormData({...formData, role: e.target.value})}
                                        className="w-full border rounded px-3 py-2"
                                    >
                                        <option value="staff">Staff</option>
                                        <option value="manager">Manager</option>
                                        <option value="owner">Owner</option>
                                    </select>
                                </div>
                                <button type="submit" className="btn-primary text-white px-6 py-2 rounded-lg">
                                    Add User
                                </button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-sm overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Username</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Role</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr className="border-t bg-gray-50">
                                    <td className="px-4 py-3">admin</td>
                                    <td className="px-4 py-3">
                                        <span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-xs">Owner</span>
                                    </td>
                                    <td className="px-4 py-3 text-gray-500 text-sm">Default user</td>
                                </tr>
                                {users.map(user => (
                                    <tr key={user.id} className="border-t">
                                        <td className="px-4 py-3">{user.username}</td>
                                        <td className="px-4 py-3">
                                            <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs capitalize">
                                                {user.role}
                                            </span>
                                        </td>
                                        <td className="px-4 py-3">
                                            <button 
                                                onClick={() => {
                                                    if (confirm('Delete this user?')) {
                                                        deleteUser(user.id);
                                                    }
                                                }}
                                                className="text-red-600 hover:text-red-800 text-sm"
                                            >
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [page, setPage] = useState('home');
            const { user } = useAuth();

            // Admin pages
            if (page === 'admin') {
                return user ? <AdminDashboard setPage={setPage} /> : <AdminLogin setPage={setPage} />;
            }
            if (page === 'admin-dashboard') {
                return user ? <AdminDashboard setPage={setPage} /> : <AdminLogin setPage={setPage} />;
            }

            // Customer pages
            return (
                <div>
                    <Header page={page} setPage={setPage} />
                    {page === 'home' && <HomePage setPage={setPage} />}
                    {page === 'shop' && <ShopPage />}
                    {page === 'cart' && <CartPage setPage={setPage} />}
                    {page === 'checkout' && <CheckoutPage setPage={setPage} />}
                    {page === 'order-confirmation' && <OrderConfirmationPage setPage={setPage} />}
                    {page === 'about' && <AboutPage />}
                </div>
            );
        }

        // Root Render
        function Root() {
            return (
                <AuthProvider>
                    <ProductProvider>
                        <OrderProvider>
                            <CartProvider>
                                <App />
                            </CartProvider>
                        </OrderProvider>
                    </ProductProvider>
                </AuthProvider>
            );
        }

        ReactDOM.render(<Root />, document.getElementById('root'));
    </script>
</body>
</html>
